services:
  denon-dashboard:
    image: ghcr.io/oxygenlack/denon-dashboard:latest
    container_name: denon-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Leave DENON_HOST empty to auto-discover your receiver via SSDP (recommended)
      # Set it explicitly if auto-discovery doesn't work on your network
      - DENON_DASHBOARD_DENON_HOST=

      # ── Optional ────────────────────────────────────────────────────────────
      # Telnet port (default: 23, rarely needs changing)
      #- DENON_DASHBOARD_DENON_TELNET_PORT=23
      # Display name shown in the dashboard header
      #- DENON_DASHBOARD_DENON_DEVICE_NAME=My Receiver
      # Zone tab labels
      #- DENON_DASHBOARD_DENON_ZONE1_NAME=Main Zone
      #- DENON_DASHBOARD_DENON_ZONE2_NAME=Zone 2
      # Custom source names — maps protocol codes to display names (JSON)
      # Find your codes by switching inputs and watching SI<CODE> telnet responses
      #- DENON_DASHBOARD_DENON_SOURCE_NAMES={"GAME":"Game Console","TV":"TV Audio","NET":"Streaming","BD":"Blu-ray","BT":"Bluetooth"}
      # Log level: DEBUG, INFO, WARNING, ERROR (default: INFO)
      #- DENON_DASHBOARD_LOG_LEVEL=INFO

    # ── Traefik (optional) ───────────────────────────────────────────────────
    # Remove the 'ports' section above and uncomment this block if using Traefik
    #labels:
    #  - "traefik.enable=true"
    #  - "traefik.http.routers.denon-dashboard.rule=Host(`denon.example.com`)"
    #  - "traefik.http.routers.denon-dashboard.entrypoints=websecure"
    #  - "traefik.http.routers.denon-dashboard.tls=true"
    #  - "traefik.http.routers.denon-dashboard.tls.certresolver=letsencrypt"
    #  - "traefik.http.services.denon-dashboard.loadbalancer.server.port=8080"
    #networks:
    #  - traefik_proxy

#networks:
#  traefik_proxy:
#    external: true
